{{ template "header" . }}
<h3 class="mb-4"><i class="bi bi-journal-text"></i> 系统日志</h3>
<a href="/admin" class="btn btn-outline-secondary btn-sm mb-3">← 返回仪表盘</a>
<div class="table-responsive">
    <table class="table table-hover table-sm">
        <thead class="table-light"><tr><th>ID</th><th>用户</th><th>操作</th><th>详情</th><th>时间</th></tr></thead>
        <tbody>
            {{ range .Logs }}<tr><td>{{ .ID }}</td><td>{{ if .UserID }}#{{ .UserID }}{{ else }}-{{ end }}</td><td><code>{{ .Action }}</code></td><td class="text-muted small">{{ .Detail }}</td><td class="text-muted small">{{ .CreatedAt.Format "2006-01-02 15:04:05" }}</td></tr>{{ end }}
            {{ if not .Logs }}<tr><td colspan="5" class="text-center text-muted py-3">暂无日志记录</td></tr>{{ end }}
        </tbody>
    </table>
</div>
{{ template "footer" . }}
