{{ template "header" . }}
<h3 class="mb-4"><i class="bi bi-people"></i> 用户管理</h3>
<a href="/admin" class="btn btn-outline-secondary btn-sm mb-3">← 返回仪表盘</a>
<div class="table-responsive">
    <table class="table table-hover align-middle">
        <thead class="table-light"><tr><th>ID</th><th>用户名</th><th>邮箱</th><th>角色</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead>
        <tbody>
            {{ range .Users }}
            <tr>
                <td>{{ .ID }}</td>
                <td><img src="{{ .AvatarURL }}" class="rounded-circle me-1" width="24" height="24" style="object-fit:cover" onerror="this.src='/static/img/default-avatar.svg'">{{ .Username }}</td>
                <td class="text-muted small">{{ .Email }}</td>
                <td><span class="badge {{ if eq .Role "admin" }}bg-danger{{ else }}bg-secondary{{ end }}">{{ .Role }}</span></td>
                <td><span class="badge {{ if eq .Status 1 }}bg-success{{ else }}bg-dark{{ end }}">{{ if eq .Status 1 }}正常{{ else }}封禁{{ end }}</span></td>
                <td class="text-muted small">{{ .CreatedAt.Format "2006-01-02" }}</td>
                <td>{{ if ne .Role "admin" }}<button class="btn btn-sm {{ if eq .Status 1 }}btn-outline-danger{{ else }}btn-outline-success{{ end }}" onclick="toggleUser({{ .ID }}, {{ if eq .Status 1 }}0{{ else }}1{{ end }})">{{ if eq .Status 1 }}封禁{{ else }}解封{{ end }}</button>{{ end }}</td>
            </tr>
            {{ end }}
        </tbody>
    </table>
</div>
<script>function toggleUser(id,s){if(!confirm('确认'+(s===0?'封禁':'解封')+'该用户?'))return;fetch('/api/v1/admin/users/'+id+'/status',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:s})}).then(r=>r.json()).then(d=>{if(d.code===0)location.reload();else alert(d.message)})}</script>
{{ template "footer" . }}
