{{ template "header" . }}
<div class="row"><div class="col-lg-8 mx-auto">
    <h3 class="mb-4"> 编辑帖子</h3>
    {{ if .Error }}<div class="alert alert-danger">{{ .Error }}</div>{{ end }}
    {{ $post := .Post }}
    <form method="POST" action="/post/{{ $post.ID }}/edit">
        {{ if $post.Images }}
        <div class="mb-3"><label class="form-label">作品图片</label>
            <div class="d-flex gap-2 flex-wrap">
                {{ range $post.Images }}<img src="{{ .ImageURL }}" class="rounded" style="width:120px;height:120px;object-fit:cover">{{ end }}
            </div>
            <small class="text-muted">图片不可修改，需更换请删帖重发</small>
        </div>
        {{ end }}
        <div class="mb-3"><label class="form-label">作品描述</label><textarea name="content" class="form-control" rows="4" maxlength="500">{{ $post.Content }}</textarea></div>
        <div class="d-flex gap-2"><button type="submit" class="btn btn-primary"><i class="bi bi-check2"></i> 保存</button><a href="/post/{{ $post.ID }}" class="btn btn-outline-secondary">取消</a></div>
    </form>
</div></div>
{{ template "footer" . }}
