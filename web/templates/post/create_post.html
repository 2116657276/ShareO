{{ template "header" . }}
<div class="row" x-data="uploadForm()">
    <div class="col-lg-8 mx-auto">
        <h3 class="mb-4">发布作品</h3>
        {{ if .Error }}<div class="alert alert-danger">{{ .Error }}</div>{{ end }}
        <form method="POST" action="/post/create" @submit="prepareSubmit($event)">
            <input type="hidden" name="images" :value="uploadedUrls.join(',')">
            <div class="mb-3">
                <label class="form-label">选择图片 <small class="text-muted">(第一张为封面)</small></label>
                <div class="upload-zone" @click="$refs.fileInput.click()"
                     @dragover.prevent="$el.classList.add('dragover')"
                     @dragleave.prevent="$el.classList.remove('dragover')"
                     @drop.prevent="handleDrop($event)">
                    <i class="bi bi-cloud-upload" style="font-size:2.5rem;color:var(--primary)"></i>
                    <p class="mt-2 mb-0 fw-medium">点击或拖拽上传图片</p>
                    <small class="text-muted">支持 JPG / PNG / WebP / GIF，单张不超过 50MB</small>
                    <input type="file" x-ref="fileInput" accept="image/*" multiple hidden @change="handleFileSelect($event)">
                </div>
                <div class="upload-preview" x-show="images.length > 0">
                    <template x-for="(img, idx) in images" :key="idx">
                        <div class="preview-item">
                            <img :src="img.preview" alt="preview">
                            <button type="button" class="remove-btn" @click="removeImage(idx)">&times;</button>
                        </div>
                    </template>
                </div>
                <div x-show="uploading" class="mt-2 text-primary">
                    <span class="spinner-border spinner-border-sm me-1"></span>上传中...
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">作品描述</label>
                <textarea name="content" class="form-control" rows="4" placeholder="分享你的作品故事..." maxlength="500"></textarea>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg" :disabled="uploadedUrls.length === 0">
                    <i class="bi bi-send"></i> 发布作品
                </button>
            </div>
            <div class="mt-3 text-muted text-center">
                <small><i class="bi bi-info-circle"></i> 发布后需管理员审核通过才会在Feed中展示</small>
            </div>
        </form>
    </div>
</div>
<script>
function uploadForm() {
    return {
        images: [], uploadedUrls: [], uploading: false,

        async uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);
            const resp = await fetch('/api/v1/upload', { method: 'POST', body: formData });
            const data = await resp.json();
            if (data.code === 0 && data.data.url) {
                this.uploadedUrls.push(data.data.url);
            } else {
                alert('上传失败: ' + (data.message || '未知错误'));
            }
        },

        async handleFileSelect(e) {
            const files = Array.from(e.target.files).filter(f => f.size <= 50*1024*1024);
            if (!files.length) { e.target.value = ''; return; }
            this.uploading = true;
            // Show previews immediately
            for (const f of files) {
                const reader = new FileReader();
                const p = new Promise(r => { reader.onload = e => r(e.target.result); });
                reader.readAsDataURL(f);
                this.images.push({ preview: await p, name: f.name });
            }
            // Upload concurrently
            await Promise.all(files.map(f => this.uploadFile(f)));
            this.uploading = false;
            e.target.value = '';
        },

        async handleDrop(e) {
            e.target.closest('.upload-zone').classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/') && f.size <= 50*1024*1024);
            if (!files.length) return;
            this.uploading = true;
            for (const f of files) {
                const reader = new FileReader();
                const p = new Promise(r => { reader.onload = e => r(e.target.result); });
                reader.readAsDataURL(f);
                this.images.push({ preview: await p, name: f.name });
            }
            await Promise.all(files.map(f => this.uploadFile(f)));
            this.uploading = false;
        },

        removeImage(idx) {
            this.uploadedUrls.splice(idx, 1);
            this.images.splice(idx, 1);
        },

        prepareSubmit(e) {
            if (this.uploading) {
                e.preventDefault();
                alert('请等待图片上传完成');
                return false;
            }
            if (this.uploadedUrls.length === 0) {
                e.preventDefault();
                alert('请先上传至少一张图片');
                return false;
            }
            return true;
        }
    };
}
</script>
{{ template "footer" . }}
